<div class="login">
    <div class="login-wrapper">
        <mat-card class="login-card shadow-lg">
            <mat-card-header>
            <div mat-card-avatar class="login-header-image"></div>
            <mat-card-title>RestoApp</mat-card-title>
            <mat-card-subtitle>Bienvenido, por favor identifícate</mat-card-subtitle>
            </mat-card-header>

            <mat-card-content>
            <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">
                
                <mat-form-field appearance="outline">
                <mat-label>Email</mat-label>
                <input matInput formControlName="email" type="email" placeholder="usuario@resto.com">
                <mat-icon matSuffix>person</mat-icon>
                <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
                    Ingresa un correo válido
                </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline">
                <mat-label>Contraseña</mat-label>
                <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
                <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button" aria-label="Ver contraseña">
                    <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
                <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
                    Mínimo 6 caracteres
                </mat-error>
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid" class="login-button">
                INICIAR SESIÓN
                </button>
            </form>
            </mat-card-content>

            <mat-card-footer>
            <p class="footer-text">¿Olvidaste tu contraseña? <a href="#">Haz clic aquí</a></p>
            </mat-card-footer>
        </mat-card>
    </div>
</div>
